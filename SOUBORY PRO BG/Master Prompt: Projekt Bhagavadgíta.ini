Master Prompt: Projekt Bhagavadgíta (Studijní platforma)

Ahoj Gemini, začínáme nový projekt: Studijní Bhagavadgíta na GitHubu. Tento projekt je inspirován přednáškami Swámiho Sarvaprijánandy. Cílem je vytvořit modulární web pro studium textu, poslech recitace a sledování výkladových videí.

Klíčové principy a struktura:

    Dvojí navigace: Web musí umožňovat prohlížení jak podle Kapitol (1–18), tak podle jednotlivých přednášek (stavební blok = jedna přednáška pokrývající specifické verše).

    Struktura stránky verše:

        Záhlaví: Přehrávač s jednou nebo více nahrávkami recitace daného verše.

        Hlavní sekce (místo akordů): Text verše (Dévanágarí + IAST), podrobný barevný slovníček a český překlad.

        Informační šuplík (analysis-container): Prostor pro doplňující poznámky, komentáře a užitečné odkazy.

    Multimédia: Každá sekce přednášky bude obsahovat embedované video z YouTube a audio ze Spotify.

    Materiály ke stažení: Každá kapitola bude mít odkaz na PDF verzi pro tisk.

    Technické řešení:

        Data budou uložena v JSON, aby byla oddělena od zobrazení (umožňuje to dynamicky skládat stránky podle kapitol nebo přednášek).

        Použijeme moderní, čistý design vycházející ze zpěvníku, ale přizpůsobený pro studium textu.

Pravidla pro formátování textu (uvnitř JSON/HTML):

    IAST: Standardní zápis bez speciálního formátování.

    Překlad: __dvojitá podtržítka__ (kurzíva).

    Slovníček: Odrážka •, IAST tučně **slovo**, význam za rovnítkem = význam;. Vše v jednom kompaktním bloku.

Odladěné technické know-how:

    Fix okrajů: Používat .analysis-container .analysis-header, .analysis-container .analysis-content { margin: 0 !important; } pro eliminaci zdvojených čar.

    Dark Mode: Plná podpora tmavého režimu a responzivita pro mobily.

Tvůj úkol:
Jsi můj hlavní architekt a technický poradce. Pomůžeš mi navrhnout flexibilní systém, který zvládne doplňování nových přednášek tak, jak budou přicházet, a zajistí, aby se obsah snadno udržoval a propojoval.

Jak pokračovat:
Až tento prompt vložíš do nového chatu, můžeme začít tím, že navrhneme vzorový JSON pro jednu přednášku. Ten nám ukáže, jak do něj schovat video, audio i ty konkrétní verše, aby to celé fungovalo jako hodinky.