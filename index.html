<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samhita zpěvník</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: #fff;
    font-family: 'Georgia', serif;
    color: #222;
  }

  /* Fixní horní lišta */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  }

  header {
    background: #d35400;
    color: white;
    padding: 24px 20px 16px;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-text {
    min-width: 0;
  }

  .header-actions {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .menu-btn {
    appearance: none;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: rgba(255, 255, 255, 0.10);
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    font-size: 20px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.06s;
  }

  .menu-btn:hover { background: rgba(255, 255, 255, 0.16); border-color: rgba(255, 255, 255, 0.35); }
  .menu-btn:active { transform: translateY(1px); }
  .menu-btn:focus-visible { outline: 2px solid rgba(255,255,255,0.75); outline-offset: 2px; }

  header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
  }

  header p {
    margin: 4px 0 0;
    font-size: 14px;
    opacity: 0.85;
  }

  .last-update {
    margin-top: 6px;
    font-size: 12px;
    font-family: sans-serif;
    opacity: 0.8;
    white-space: nowrap;
  }

  #search-wrap {
    padding: 16px 20px;
    background: #fdf3ec;
    border-bottom: 1px solid #f0d5c0;
  }

  #search {
    width: 100%;
    padding: 10px 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    font-family: sans-serif;
  }

  #search:focus { border-color: #d35400; }

  /* Aktivní filtr nad seznamem */
  #active-filter {
    padding: 10px 20px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    display: none;
  }

  .filter-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 999px;
    background: #f3f4f6;
    border: 1px solid rgba(0, 0, 0, 0.06);
    font-family: sans-serif;
    font-size: 13px;
    color: #444;
  }

  .filter-pill strong { font-weight: 800; }

  .filter-clear {
    appearance: none;
    border: 0;
    background: transparent;
    color: #666;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 8px;
  }

  .filter-clear:hover,
  .filter-clear:focus-visible {
    background: rgba(0,0,0,0.06);
    color: #222;
    outline: none;
  }

  /* Sidebar */
  #sidebar-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
    z-index: 90;
  }

  #sidebar-backdrop.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  #sidebar {
    position: fixed;
    top: 0;
    right: 0;
    height: 100dvh;
    width: min(360px, 86vw);
    background: #ffffff;
    border-left: 1px solid rgba(0,0,0,0.08);
    transform: translateX(102%);
    transition: transform 0.22s ease;
    z-index: 100;
    display: flex;
    flex-direction: column;
  }

  #sidebar.is-open { transform: translateX(0); }

  .sidebar-header {
    padding: 14px 14px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: #fdf3ec;
  }

  .sidebar-title {
    font-family: sans-serif;
    font-weight: 800;
    color: #5a3a2a;
  }

  .sidebar-close {
    appearance: none;
    border: 1px solid rgba(0,0,0,0.10);
    background: #fff;
    color: #333;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
  }

  .sidebar-close:hover { border-color: rgba(0,0,0,0.18); }
  .sidebar-close:active { transform: translateY(1px); }

  .sidebar-content {
    padding: 14px;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  .sidebar-section + .sidebar-section { margin-top: 16px; }

  .sidebar-section h3 {
    margin: 0 0 10px;
    font-size: 13px;
    font-family: sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #777;
  }

  .sidebar-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .pill-btn {
    appearance: none;
    border: 1px solid rgba(0,0,0,0.10);
    background: #fff;
    color: #333;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 14px;
    font-family: sans-serif;
    cursor: pointer;
    transition: transform 0.06s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .pill-btn:hover { border-color: #d35400; }
  .pill-btn:active { transform: translateY(1px); }

  .pill-btn.is-active {
    background: #d35400;
    color: #fff;
    border-color: #d35400;
    box-shadow: 0 6px 16px rgba(211, 84, 0, 0.18);
  }

  .category-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .category-btn {
    text-align: left;
    width: 100%;
    border-radius: 12px;
    padding: 10px 12px;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 12px 14px;
    border-top: 1px solid rgba(0,0,0,0.08);
    font-family: sans-serif;
    font-size: 12px;
    color: #777;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .sidebar-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
  }

  .sidebar-logo img {
    height: 26px;
    width: auto;
    display: block;
  }

  #song-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  #song-list li {
    border-bottom: 1px solid #f0f0f0;
  }

  #song-list li a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    text-decoration: none;
    color: #222;
    transition: background 0.15s;
  }

  #song-list li a:hover,
  #song-list li a:active {
    background: #fdf3ec;
  }

  .song-icon {
    font-size: 20px;
    margin-right: 12px;
    flex-shrink: 0;
  }

  .song-info { flex: 1; }

  .song-name {
    font-size: 17px;
    font-weight: bold;
    display: block;
  }

  .song-meta {
    display: block;
    margin-top: 4px;
    font-size: 13px;
    color: #888;
    font-family: sans-serif;
  }

  .song-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  .song-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    background: #f3f4f6;
    border: 1px solid rgba(0, 0, 0, 0.06);
    color: #4b5563;
    font-size: 12px;
    line-height: 1.4;
    font-family: sans-serif;
  }

  /* Pastelové barvy tagů (cyklí se podle pořadí v rámci písničky) */
  .song-tags .song-tag:nth-child(6n + 1) { background: #fde2e4; color: #7a2e2e; border-color: rgba(122, 46, 46, 0.12); }
  .song-tags .song-tag:nth-child(6n + 2) { background: #e2f0ff; color: #234a7a; border-color: rgba(35, 74, 122, 0.12); }
  .song-tags .song-tag:nth-child(6n + 3) { background: #e6f7e8; color: #245a2f; border-color: rgba(36, 90, 47, 0.12); }
  .song-tags .song-tag:nth-child(6n + 4) { background: #fff4d6; color: #6b4a12; border-color: rgba(107, 74, 18, 0.14); }
  .song-tags .song-tag:nth-child(6n + 5) { background: #efe7ff; color: #4c2b7a; border-color: rgba(76, 43, 122, 0.12); }
  .song-tags .song-tag:nth-child(6n + 6) { background: #e7fbf7; color: #0f4f46; border-color: rgba(15, 79, 70, 0.12); }

  .song-sub {
    font-size: 13px;
    color: #888;
    display: block;
    margin-top: 2px;
    font-style: italic;
  }

  .song-arrow {
    color: #ccc;
    font-size: 18px;
    margin-left: 8px;
  }

  #no-results {
    padding: 30px 20px;
    color: #999;
    font-family: sans-serif;
    font-size: 15px;
    display: none;
  }

  #loading {
    padding: 30px 20px;
    text-align: center;
    color: #999;
    font-family: sans-serif;
    font-size: 15px;
  }

  footer {
    padding: 30px 20px;
    text-align: center;
    font-size: 12px;
    color: #bbb;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<div class="topbar">
  <header>
    <div class="header-inner">
      <div class="header-text">
        <h1>🎵 Samhita Songbook</h1>
        <div class="last-update" id="last-update">Aktualizováno: —</div>
      </div>
      <div class="header-actions">
        <button class="menu-btn" id="menu-btn" type="button" aria-label="Otevřít menu" aria-haspopup="dialog" aria-controls="sidebar">⋯</button>
      </div>
    </div>
  </header>
  <div id="search-wrap">
    <input id="search" type="search" placeholder="Hledat písničku…" oninput="filterSongs()" />
  </div>
</div>

<div id="active-filter"></div>

<div id="loading">Načítám písničky...</div>
<ul id="song-list"></ul>
<div id="no-results">Žádná písničká nenalezena.</div>

<footer>Zpěvník • GitHub Pages</footer>

<div id="sidebar-backdrop" onclick="closeSidebar()"></div>
<aside id="sidebar" role="dialog" aria-modal="true" aria-label="Menu">
  <div class="sidebar-header">
    <div class="sidebar-title">Menu</div>
    <button class="sidebar-close" type="button" aria-label="Zavřít menu" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-content">
    <section class="sidebar-section" aria-label="Řazení">
      <h3>Řazení</h3>
      <div class="sidebar-buttons">
        <button id="sort-az" class="pill-btn is-active" type="button" onclick="setSortMode('az')">Abeceda</button>
        <button id="sort-new" class="pill-btn" type="button" onclick="setSortMode('newest')">Nejnovější</button>
      </div>
    </section>

    <section class="sidebar-section" aria-label="Kategorie">
      <h3>Kategorie</h3>
      <div class="category-list" id="category-list"></div>
    </section>
  </div>

  <div class="sidebar-footer">
    <a class="sidebar-logo" href="https://www.samhita.cz" target="_blank" rel="noopener noreferrer" aria-label="Otevřít web Samhita">
      <img src="assets/logo_top.png" alt="Samhita" />
      <span>www.samhita.cz</span>
    </a>
    <span id="sidebar-last-update">Aktualizováno: —</span>
  </div>
</aside>

<script>
// ============================================================
// Načtení písniček ze souboru songs.json
// ============================================================

let songs = [];
let sortMode = 'az';
let categoryFilter = null;

const CATEGORY_ORDER = [
  'Buddhistické',
  'Indické - základní',
  'Indické - Kršna',
  'Indické - Šiva',
  'Indické - Ráma',
  'Indické - Bohyně',
  'Indické - ostatní',
  'Písně',
];

// Načteme songs.json
fetch('songs.json')
  .then(response => response.json())
  .then(data => {
    songs = data;
    document.getElementById('loading').style.display = 'none';
    renderCategoryMenu();
    applyFiltersAndRender();
  })
  .catch(error => {
    console.error('Chyba při načítání písniček:', error);
    document.getElementById('loading').innerHTML = 'Chyba při načítání písniček 😢';
  });

// Datum poslední úpravy stránky (z hlaviček souboru v prohlížeči)
(function renderLastUpdate() {
  const el = document.getElementById('last-update');
  if (!el) return;
  const d = new Date(document.lastModified);
  if (Number.isNaN(d.getTime())) return;
  const formatted = new Intl.DateTimeFormat('cs-CZ', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
  el.textContent = `Aktualizováno: ${formatted}`;

  const el2 = document.getElementById('sidebar-last-update');
  if (el2) el2.textContent = `Aktualizováno: ${formatted}`;
})();

// ============================================================
// Funkce pro zobrazení a filtrování
// ============================================================

function buildUrl(song) {
  let url = 'song.html?s=' + encodeURIComponent(song.file);
  if (song.audio) url += '&audio=' + encodeURIComponent(song.audio);
  return url;
}

function normalizeText(value) {
  return (value ?? '')
    .toString()
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function songMatchesQuery(song, qNorm) {
  if (!qNorm) return true;
  const name = normalizeText(song.name);
  const category = normalizeText(song.category);
  const tags = Array.isArray(song.tags) ? song.tags.map(normalizeText) : [];
  return (
    name.includes(qNorm) ||
    category.includes(qNorm) ||
    tags.some(t => t.includes(qNorm))
  );
}

function sortSongs(list) {
  const collator = new Intl.Collator('cs', { sensitivity: 'base' });
  const copy = [...list];

  if (sortMode === 'newest') {
    copy.sort((a, b) => {
      const aTime = Date.parse(a.dateAdded ?? '') || 0;
      const bTime = Date.parse(b.dateAdded ?? '') || 0;
      if (aTime !== bTime) return bTime - aTime; // nejnovější nahoře
      return collator.compare(a.name ?? '', b.name ?? '');
    });
    return copy;
  }

  copy.sort((a, b) => collator.compare(a.name ?? '', b.name ?? ''));
  return copy;
}

function renderSongs(list) {
  const ul = document.getElementById('song-list');
  const noRes = document.getElementById('no-results');
  ul.innerHTML = '';
  if (list.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';
  list.forEach(song => {
    const tags = Array.isArray(song.tags) ? song.tags.filter(Boolean) : [];
    const tagsHtml = tags.length
      ? `<span class="song-tags">${tags.map(t => `<span class="song-tag">${t}</span>`).join('')}</span>`
      : '';

    const li = document.createElement('li');
    li.innerHTML = `
      <a href="${buildUrl(song)}">
        <span class="song-icon">🎵</span>
        <span class="song-info">
          <span class="song-name">${song.name}</span>
          ${song.subtitle ? `<span class="song-sub">${song.subtitle}</span>` : ''}
          ${song.category ? `<span class="song-meta">${song.category}</span>` : ''}
          ${tagsHtml}
        </span>
        <span class="song-arrow">›</span>
      </a>`;
    ul.appendChild(li);
  });
}

function applyFiltersAndRender() {
  const qNorm = normalizeText(document.getElementById('search').value);
  const filtered = songs
    .filter(s => !categoryFilter || (s.category ?? '') === categoryFilter)
    .filter(s => songMatchesQuery(s, qNorm));
  const sorted = sortSongs(filtered);
  renderActiveFilter();
  renderSongs(sorted);
}

function filterSongs() {
  applyFiltersAndRender();
}

function setSortMode(mode) {
  sortMode = mode === 'newest' ? 'newest' : 'az';
  document.getElementById('sort-az').classList.toggle('is-active', sortMode === 'az');
  document.getElementById('sort-new').classList.toggle('is-active', sortMode === 'newest');
  closeSidebar();
  applyFiltersAndRender();
}

function renderCategoryMenu() {
  const list = document.getElementById('category-list');
  if (!list) return;
  list.innerHTML = '';
  CATEGORY_ORDER.forEach(cat => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pill-btn category-btn';
    btn.textContent = cat;
    btn.onclick = () => setCategoryFilter(cat);
    list.appendChild(btn);
  });
}

function setCategoryFilter(cat) {
  categoryFilter = cat;
  closeSidebar();
  applyFiltersAndRender();
}

function clearCategoryFilter() {
  categoryFilter = null;
  applyFiltersAndRender();
}

function renderActiveFilter() {
  const wrap = document.getElementById('active-filter');
  if (!wrap) return;
  if (!categoryFilter) {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  wrap.style.display = 'block';
  wrap.innerHTML = `
    <span class="filter-pill">
      Filtr: <strong>${categoryFilter}</strong>
      <button class="filter-clear" type="button" aria-label="Zrušit filtr" onclick="clearCategoryFilter()">✕</button>
    </span>
  `;
}

function openSidebar() {
  document.getElementById('sidebar')?.classList.add('is-open');
  document.getElementById('sidebar-backdrop')?.classList.add('is-open');
}

function closeSidebar() {
  document.getElementById('sidebar')?.classList.remove('is-open');
  document.getElementById('sidebar-backdrop')?.classList.remove('is-open');
}

document.getElementById('menu-btn')?.addEventListener('click', openSidebar);
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeSidebar();
});
</script>
</body>
</html>
