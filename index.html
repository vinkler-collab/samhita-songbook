<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seznam songů</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: #fff;
    font-family: 'Georgia', serif;
    color: #222;
  }

  header {
    background: #d35400;
    color: white;
    padding: 24px 20px 16px;
  }

  header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
  }

  header p {
    margin: 4px 0 0;
    font-size: 14px;
    opacity: 0.85;
  }

  #search-wrap {
    padding: 16px 20px;
    background: #fdf3ec;
    border-bottom: 1px solid #f0d5c0;
  }

  #search {
    width: 100%;
    padding: 10px 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    font-family: sans-serif;
  }

  #search:focus { border-color: #d35400; }

  .sort-controls {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .sort-btn {
    appearance: none;
    border: 1px solid #e7c6ae;
    background: #fff;
    color: #5a3a2a;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 14px;
    font-family: sans-serif;
    cursor: pointer;
    transition: transform 0.06s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .sort-btn:hover { border-color: #d35400; }

  .sort-btn:active { transform: translateY(1px); }

  .sort-btn.is-active {
    background: #d35400;
    color: #fff;
    border-color: #d35400;
    box-shadow: 0 6px 16px rgba(211, 84, 0, 0.25);
  }

  #song-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  #song-list li {
    border-bottom: 1px solid #f0f0f0;
  }

  #song-list li a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    text-decoration: none;
    color: #222;
    transition: background 0.15s;
  }

  #song-list li a:hover,
  #song-list li a:active {
    background: #fdf3ec;
  }

  .song-icon {
    font-size: 20px;
    margin-right: 12px;
    flex-shrink: 0;
  }

  .song-info { flex: 1; }

  .song-name {
    font-size: 17px;
    font-weight: bold;
    display: block;
  }

  .song-meta {
    display: block;
    margin-top: 4px;
    font-size: 13px;
    color: #888;
    font-family: sans-serif;
  }

  .song-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  .song-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    background: #f3f4f6;
    border: 1px solid rgba(0, 0, 0, 0.06);
    color: #4b5563;
    font-size: 12px;
    line-height: 1.4;
    font-family: sans-serif;
  }

  /* Pastelové barvy tagů (cyklí se podle pořadí v rámci písničky) */
  .song-tags .song-tag:nth-child(6n + 1) { background: #fde2e4; color: #7a2e2e; border-color: rgba(122, 46, 46, 0.12); }
  .song-tags .song-tag:nth-child(6n + 2) { background: #e2f0ff; color: #234a7a; border-color: rgba(35, 74, 122, 0.12); }
  .song-tags .song-tag:nth-child(6n + 3) { background: #e6f7e8; color: #245a2f; border-color: rgba(36, 90, 47, 0.12); }
  .song-tags .song-tag:nth-child(6n + 4) { background: #fff4d6; color: #6b4a12; border-color: rgba(107, 74, 18, 0.14); }
  .song-tags .song-tag:nth-child(6n + 5) { background: #efe7ff; color: #4c2b7a; border-color: rgba(76, 43, 122, 0.12); }
  .song-tags .song-tag:nth-child(6n + 6) { background: #e7fbf7; color: #0f4f46; border-color: rgba(15, 79, 70, 0.12); }

  .song-sub {
    font-size: 13px;
    color: #888;
    display: block;
    margin-top: 2px;
    font-style: italic;
  }

  .song-arrow {
    color: #ccc;
    font-size: 18px;
    margin-left: 8px;
  }

  #no-results {
    padding: 30px 20px;
    color: #999;
    font-family: sans-serif;
    font-size: 15px;
    display: none;
  }

  #loading {
    padding: 30px 20px;
    text-align: center;
    color: #999;
    font-family: sans-serif;
    font-size: 15px;
  }

  footer {
    padding: 30px 20px;
    text-align: center;
    font-size: 12px;
    color: #bbb;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<header>
  <h1>🎵 Samhita Songbook</h1>
  <p>Klikni na písničku a otevře se s akordy a přehrávačem</p>
</header>

<div id="search-wrap">
  <input id="search" type="search" placeholder="Hledat písničku…" oninput="filterSongs()" />
  <div class="sort-controls" role="group" aria-label="Řazení">
    <button id="sort-az" class="sort-btn is-active" type="button" onclick="setSortMode('az')">Abecedně (A-Z)</button>
    <button id="sort-cat" class="sort-btn" type="button" onclick="setSortMode('category')">Podle kategorií</button>
  </div>
</div>

<div id="loading">Načítám písničky...</div>
<ul id="song-list"></ul>
<div id="no-results">Žádná písničká nenalezena.</div>

<footer>Zpěvník • GitHub Pages</footer>

<script>
// ============================================================
// Načtení písniček ze souboru songs.json
// ============================================================

let songs = [];
let sortMode = 'az';

const CATEGORY_ORDER = [
  'Buddhistické',
  'Indické - základní',
  'Indické - Kršna',
  'Indické - Šiva',
  'Indické - Ráma',
  'Indické - Bohyně',
  'Indické - ostatní',
  'Písně',
];

const CATEGORY_ORDER_MAP = new Map(
  CATEGORY_ORDER.map((c, idx) => [normalizeText(c), idx])
);

// Načteme songs.json
fetch('songs.json')
  .then(response => response.json())
  .then(data => {
    songs = data;
    document.getElementById('loading').style.display = 'none';
    applyFiltersAndRender();
  })
  .catch(error => {
    console.error('Chyba při načítání písniček:', error);
    document.getElementById('loading').innerHTML = 'Chyba při načítání písniček 😢';
  });

// ============================================================
// Funkce pro zobrazení a filtrování
// ============================================================

function buildUrl(song) {
  let url = 'song.html?s=' + encodeURIComponent(song.file);
  if (song.audio) url += '&audio=' + encodeURIComponent(song.audio);
  return url;
}

function normalizeText(value) {
  return (value ?? '')
    .toString()
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function songMatchesQuery(song, qNorm) {
  if (!qNorm) return true;
  const name = normalizeText(song.name);
  const category = normalizeText(song.category);
  const tags = Array.isArray(song.tags) ? song.tags.map(normalizeText) : [];
  return (
    name.includes(qNorm) ||
    category.includes(qNorm) ||
    tags.some(t => t.includes(qNorm))
  );
}

function sortSongs(list) {
  const collator = new Intl.Collator('cs', { sensitivity: 'base' });
  const copy = [...list];

  if (sortMode === 'category') {
    copy.sort((a, b) => {
      const aKey = normalizeText(a.category);
      const bKey = normalizeText(b.category);
      const aIdx = CATEGORY_ORDER_MAP.has(aKey) ? CATEGORY_ORDER_MAP.get(aKey) : 999;
      const bIdx = CATEGORY_ORDER_MAP.has(bKey) ? CATEGORY_ORDER_MAP.get(bKey) : 999;
      if (aIdx !== bIdx) return aIdx - bIdx;
      const catCmp = collator.compare(a.category ?? '', b.category ?? '');
      if (catCmp !== 0) return catCmp;
      return collator.compare(a.name ?? '', b.name ?? '');
    });
    return copy;
  }

  copy.sort((a, b) => collator.compare(a.name ?? '', b.name ?? ''));
  return copy;
}

function renderSongs(list) {
  const ul = document.getElementById('song-list');
  const noRes = document.getElementById('no-results');
  ul.innerHTML = '';
  if (list.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';
  list.forEach(song => {
    const tags = Array.isArray(song.tags) ? song.tags.filter(Boolean) : [];
    const tagsHtml = tags.length
      ? `<span class="song-tags">${tags.map(t => `<span class="song-tag">${t}</span>`).join('')}</span>`
      : '';

    const li = document.createElement('li');
    li.innerHTML = `
      <a href="${buildUrl(song)}">
        <span class="song-icon">🎵</span>
        <span class="song-info">
          <span class="song-name">${song.name}</span>
          ${song.subtitle ? `<span class="song-sub">${song.subtitle}</span>` : ''}
          ${song.category ? `<span class="song-meta">${song.category}</span>` : ''}
          ${tagsHtml}
        </span>
        <span class="song-arrow">›</span>
      </a>`;
    ul.appendChild(li);
  });
}

function applyFiltersAndRender() {
  const qNorm = normalizeText(document.getElementById('search').value);
  const filtered = songs.filter(s => songMatchesQuery(s, qNorm));
  const sorted = sortSongs(filtered);
  renderSongs(sorted);
}

function filterSongs() {
  applyFiltersAndRender();
}

function setSortMode(mode) {
  sortMode = mode === 'category' ? 'category' : 'az';
  document.getElementById('sort-az').classList.toggle('is-active', sortMode === 'az');
  document.getElementById('sort-cat').classList.toggle('is-active', sortMode === 'category');
  applyFiltersAndRender();
}
</script>
</body>
</html>
